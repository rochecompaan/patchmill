name: Update release Nix hash

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  update-npm-deps-hash:
    name: Update npmDepsHash on release PRs
    if:
      ${{ github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref,
      'release-please--branches--main--components--') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update npmDepsHash when Nix reports a mismatch
        id: update
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"
          if nix build --print-build-logs .#patchmill >"$log_file" 2>&1; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          got_hash="$(awk '/got:[[:space:]]+sha256-/ { print $2 }' "$log_file" | tail -n 1)"
          if [[ -z "$got_hash" ]]; then
            cat "$log_file"
            echo "Nix build failed, but no fixed-output hash mismatch was found." >&2
            exit 1
          fi

          python - "$got_hash" <<'PY'
          import pathlib
          import re
          import sys

          got_hash = sys.argv[1]
          package_file = pathlib.Path("nix/package.nix")
          text = package_file.read_text()
          updated = re.sub(
              r'npmDepsHash = "sha256-[^"]+";',
              f'npmDepsHash = "{got_hash}";',
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit("npmDepsHash assignment not found in nix/package.nix")
          package_file.write_text(updated)
          PY

          nix build --print-build-logs .#patchmill
          echo "changed=true" >>"$GITHUB_OUTPUT"

      - name: Commit updated Nix hash
        if: steps.update.outputs.changed == 'true'
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if git diff --quiet -- nix/package.nix; then
            echo "nix/package.nix already matches the computed hash."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          git commit -m "chore(nix): update release npm deps hash"
          git push origin "HEAD:${HEAD_REF}"
