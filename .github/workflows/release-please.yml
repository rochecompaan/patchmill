name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release Please bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_BOT_PRIVATE_KEY }}

      - name: Open or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release PR branch
        id: release-pr
        if: ${{ steps.release.outputs.prs_created == 'true' && steps.release.outputs.pr != '' }}
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          node <<'NODE' >>"$GITHUB_OUTPUT"
          const pr = JSON.parse(process.env.RELEASE_PR);
          const headRef = pr.headBranchName;

          if (!/^release-please--branches--main--components--[-A-Za-z0-9._/]+$/.test(headRef ?? "")) {
            throw new Error(`Unexpected release PR branch: ${headRef}`);
          }

          console.log(`head_ref=${headRef}`);
          NODE

      - name: Check out release PR branch
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-pr.outputs.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js for release PR
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install release PR dependencies
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        run: npm ci

      - name: Format generated release files
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        run: npx prettier --write npm-shrinkwrap.json package-lock.json package.json .release-please-manifest.json

      - name: Install Nix
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update npmDepsHash when Nix reports a mismatch
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        run: scripts/update-npm-deps-hash.sh

      - name: Commit updated release files
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        env:
          HEAD_REF: ${{ steps.release-pr.outputs.head_ref }}
        run: |
          set -euo pipefail

          release_files=(
            nix/package.nix
            npm-shrinkwrap.json
            package-lock.json
            package.json
            .release-please-manifest.json
          )

          if git diff --quiet -- "${release_files[@]}"; then
            echo "Release-generated files already match formatting and computed hash."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${release_files[@]}"
          git commit -m "chore(release): update generated files"
          git push origin "HEAD:${HEAD_REF}"

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: npm test

      - name: Lint
        if: ${{ steps.release.outputs.release_created }}
        run: npm run lint

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
