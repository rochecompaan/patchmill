name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release PR branch
        id: release-pr
        if:
          ${{ steps.release.outputs.prs_created == 'true' &&
          steps.release.outputs.pr != '' }}
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          node <<'NODE' >>"$GITHUB_OUTPUT"
          const pr = JSON.parse(process.env.RELEASE_PR);
          const headRef = pr.headBranchName;

          if (!/^release-please--branches--main--components--[-A-Za-z0-9._/]+$/.test(headRef ?? "")) {
            throw new Error(`Unexpected release PR branch: ${headRef}`);
          }

          console.log(`head_ref=${headRef}`);
          NODE

      - name: Check out release PR branch
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-pr.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update npmDepsHash when Nix reports a mismatch
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        run: scripts/update-npm-deps-hash.sh

      - name: Commit updated Nix hash
        if: ${{ steps.release-pr.outputs.head_ref != '' }}
        env:
          HEAD_REF: ${{ steps.release-pr.outputs.head_ref }}
        run: |
          set -euo pipefail

          if git diff --quiet -- nix/package.nix; then
            echo "nix/package.nix already matches the computed hash."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          git commit -m "chore(nix): update release npm deps hash"
          git push origin "HEAD:${HEAD_REF}"

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: npm test

      - name: Lint
        if: ${{ steps.release.outputs.release_created }}
        run: npm run lint

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
