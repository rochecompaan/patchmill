name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Smoke test npm package install
        run: |
          package_tgz="$(npm pack --silent)"
          smoke_dir="$(mktemp -d)"
          npm_cache="$(mktemp -d)"
          cleanup() {
            rm -rf "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/$package_tgz" "$smoke_dir" "$npm_cache"
          }
          trap cleanup EXIT
          mkdir -p "$smoke_dir/home" "$smoke_dir/config" "$smoke_dir/project"
          cd "$smoke_dir/project"
          npm init -y >/dev/null
          npm_config_cache="$npm_cache" npm install "$GITHUB_WORKSPACE/$package_tgz"
          ./node_modules/.bin/patchmill --help >/dev/null
          HOME="$smoke_dir/home" \
            XDG_CONFIG_HOME="$smoke_dir/config" \
            ./node_modules/.bin/patchmill init >/dev/null
          test -f .patchmill/skills/patchmill-issue-triage/SKILL.md

      - name: Lint
        run: npm run lint

  nix:
    name: Nix package build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check Nix npm deps hash
        run: |
          scripts/update-npm-deps-hash.sh
          if ! git diff --exit-code -- nix/package.nix; then
            echo "::error file=nix/package.nix::npmDepsHash is stale. Run scripts/update-npm-deps-hash.sh and commit the result."
            exit 1
          fi

      - name: Smoke test Nix package
        run: |
          ./result/bin/patchmill --help >/dev/null
          smoke_dir="$(mktemp -d)"
          mkdir -p "$smoke_dir/home" "$smoke_dir/config" "$smoke_dir/project"
          cd "$smoke_dir/project"
          HOME="$smoke_dir/home" \
            XDG_CONFIG_HOME="$smoke_dir/config" \
            "$GITHUB_WORKSPACE/result/bin/patchmill" init >/dev/null
          test -f .patchmill/skills/patchmill-issue-triage/SKILL.md
